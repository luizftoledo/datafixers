name: Deploy dashboards (ponte)

# PONTE: o CLOUDFLARE_API_TOKEN do repo datafixers-dashboards morreu em
# ~02/06/26 (auth error 10000) e o deploy nativo de la foi desabilitado.
# Este workflow usa o token valido DESTE repo (Pages Edit vale pra conta
# toda) pra publicar o projeto Pages "dashboards" a partir do main do outro
# repo. De quebra cobre um furo antigo: commits de dados feitos pelos crons
# com GITHUB_TOKEN nunca disparavam o deploy de la, entao o site so
# atualizava em push manual.
#
# Horarios casados com os crons de dados (pesquisas 12:00/21:00 UTC,
# clipping/lulometro de manha). Pra aposentar esta ponte: criar token novo
# (Account - Cloudflare Pages - Edit), gh secret set CLOUDFLARE_API_TOKEN
# no repo datafixers-dashboards, gh workflow enable "Deploy to Cloudflare
# Pages" la, e apagar este arquivo.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 7 * * *"
    - cron: "20 12 * * *"
    - cron: "20 21 * * *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          repository: luizftoledo/datafixers-dashboards
          ref: main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=dashboards --branch=main
