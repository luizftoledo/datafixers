name: Atualizar curadoria LAI

on:
  schedule:
    - cron: '20 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lai-curation
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Atualizar arquivos da curadoria
        run: python a_lai_que_pegou/scripts/update_curation.py

      - name: Commit e push se houver mudanças
        run: |
          if git diff --quiet; then
            echo "Sem mudanças para commitar."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add a_lai_que_pegou/data/*.json
          git add a_lai_que_pegou/scripts/update_curation.py

          git commit -m "Atualiza curadoria LAI automaticamente"
          git push
