<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 240" role="img" aria-label="Data Fixers">
  <title>Data Fixers</title>

  <!-- Pale mint highlight bar behind DATA only -->
  <rect x="288" y="118" width="250" height="60" fill="#b4d7d1"/>

  <!-- DATA wordmark (weight 500) -->
  <text x="413" y="162"
        font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="88" font-weight="500" fill="#1a1f1f"
        text-anchor="middle" letter-spacing="6">DATA</text>

  <!-- FIXERS wordmark (weight 850) -->
  <text x="725" y="162"
        font-family="Inter, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="88" font-weight="850" fill="#1a1f1f"
        text-anchor="middle" letter-spacing="6">FIXERS</text>

  <!-- ============================================================ -->
  <!-- Robot: "head peeking over the laptop" — option 03            -->
  <!-- Placed on the LEFT side of the frame                          -->
  <!-- ============================================================ -->
  <g id="robot" transform="translate(40 43)">
    <!-- Big open laptop centered -->
    <!-- screen / lid from front -->
    <rect x="30" y="68" width="120" height="60" rx="3" fill="#dbe2e0" stroke="#1a1f1f" stroke-width="2.5"/>
    <rect x="34" y="72" width="112" height="52" rx="2" fill="#1a1f1f"/>
    <rect x="38" y="76" width="104" height="44" fill="#0e1414"/>
    <!-- chart bars -->
    <rect x="44"  y="110" width="7" height="8"  fill="#b4d7d1"/>
    <rect x="57"  y="102" width="7" height="16" fill="#b4d7d1"/>
    <rect x="70"  y="94"  width="7" height="24" fill="#9fc9c2"/>
    <rect x="83"  y="100" width="7" height="18" fill="#b4d7d1"/>
    <rect x="96"  y="88"  width="7" height="30" fill="#9fc9c2"/>
    <rect x="109" y="96"  width="7" height="22" fill="#b4d7d1"/>
    <rect x="122" y="104" width="7" height="14" fill="#b4d7d1"/>
    <!-- hinge + base -->
    <line x1="26" y1="128" x2="154" y2="128" stroke="#1a1f1f" stroke-width="2"/>
    <path d="M 22 128 L 158 128 L 164 144 L 16 144 Z"
          fill="#dbe2e0" stroke="#1a1f1f" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="72" y1="135" x2="108" y2="135" stroke="#9fc9c2" stroke-width="2" stroke-linecap="round"/>

    <!-- Robot head peeking over the screen -->
    <line x1="90" y1="14" x2="90" y2="26" stroke="#1a1f1f" stroke-width="3" stroke-linecap="round"/>
    <circle cx="90" cy="10" r="4" fill="#b4d7d1" stroke="#1a1f1f" stroke-width="2"/>
    <rect x="62" y="26" width="56" height="42" rx="9" fill="#b4d7d1" stroke="#1a1f1f" stroke-width="2.5"/>
    <!-- ears -->
    <rect x="58"  y="38" width="4" height="16" rx="1" fill="#1a1f1f"/>
    <rect x="118" y="38" width="4" height="16" rx="1" fill="#1a1f1f"/>
    <!-- visor -->
    <rect x="68" y="34" width="44" height="20" rx="3" fill="#1a1f1f"/>
    <circle cx="80"  cy="44" r="2.4" fill="#b4d7d1"/>
    <circle cx="100" cy="44" r="2.4" fill="#b4d7d1"/>

    <!-- tiny hands on top of the lid -->
    <circle cx="46"  cy="68" r="4" fill="#b4d7d1" stroke="#1a1f1f" stroke-width="2"/>
    <circle cx="134" cy="68" r="4" fill="#b4d7d1" stroke="#1a1f1f" stroke-width="2"/>
  </g>
</svg>
